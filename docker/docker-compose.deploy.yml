version: '3.8'

services:
  publisher:
    image: basic:deploy
    build:
      context: ..
      dockerfile: docker/Dockerfile.deploy
    container_name: publisher
    network_mode: host
    ipc: host
    environment: 
      ROS_DOMAIN_ID: '0'
    command: >
      bash -c "source /opt/ros/$${ROS_DISTRO}/setup.bash &&
              source /workspaces/code/install/setup.bash &&
              ros2 run basic_topic publisher_component_node"
    restart: unless-stopped
  subscriber:
    image: basic:deploy
    build:
      context: ..
      dockerfile: docker/Dockerfile.deploy
    container_name: subscriber
    network_mode: host
    ipc: host
    environment: 
      ROS_DOMAIN_ID: '0'
    command: >
      bash -c "source /opt/ros/$${ROS_DISTRO}/setup.bash &&
              source /workspaces/code/install/setup.bash &&
              ros2 run basic_topic subscriber_component_node"
    restart: unless-stopped